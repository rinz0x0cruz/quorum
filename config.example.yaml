# quorum example configuration.
# Copy to config.yaml and edit. Every key is optional; the values below are the
# built-in defaults. Secrets never live here -- each provider names an environment
# variable that holds its key (see .env.example).

# The council: any number of models, across any providers below. Defaults to a
# trio of FREE OpenRouter models so you can start at zero cost. Add a local
# Ollama model, OpenAI, Groq, ... -- you own the roster.
council:
  members:
    - { name: alice, provider: openrouter, model: meta-llama/llama-3.3-70b-instruct:free }
    - { name: bob,   provider: openrouter, model: qwen/qwen3-next-80b-a3b-instruct:free }
    - { name: carol, provider: openrouter, model: google/gemma-4-31b-it:free }
    # Optionally give a member its own fallback chain (tried in order if its call
    # fails, e.g. a free tier returns 429). Overrides run.fallbacks for that member.
    # - { name: dave, provider: openrouter, model: some/model:free, fallbacks: [openrouter:another/model, groq:llama-3.1-70b] }
  # Single-model roles, referenced as "provider:model". Empty -> first member.
  judge:      openrouter:openai/gpt-oss-120b:free
  chairman:   openrouter:openai/gpt-oss-120b:free
  aggregator: openrouter:openai/gpt-oss-120b:free
  # Per-role fallbacks (optional): judge_fallbacks / chairman_fallbacks / aggregator_fallbacks
  # judge_fallbacks: [openrouter:google/gemma-4-31b-it:free]

# Provider profiles: any OpenAI-compatible /chat/completions endpoint. The
# built-in "mock" provider is fully offline (used by selftest + replay).
providers:
  openrouter: { base_url: https://openrouter.ai/api/v1, api_key_env: QUORUM_OPENROUTER_KEY }
  openai:     { base_url: https://api.openai.com/v1,    api_key_env: QUORUM_OPENAI_KEY }
  groq:       { base_url: https://api.groq.com/openai/v1, api_key_env: QUORUM_GROQ_KEY }
  ollama:     { base_url: http://localhost:11434/v1,   api_key_env: "" }   # local, keyless
  mock:       { base_url: "", api_key_env: "" }                            # offline

run:
  strategy: refine         # debate | council | moa | refine | ensemble  (refine: best cost/accuracy in eval)
  max_rounds: 4            # hard cap on deliberation rounds
  target_score: 85         # 0-100 "good enough" threshold
  plateau_delta: 2         # stop if the best score gains < this ...
  plateau_patience: 2      # ... for this many consecutive rounds
  consensus: false         # also stop when members converge on one answer
  moa_layers: 2            # layers for the mixture-of-agents strategy
  samples: 3               # ensemble: number of samples (the max/budget when adaptive)
  samples_min: 2           # ensemble: min samples before an adaptive early-stop
  adaptive_samples: false  # ensemble: sample one at a time, stop on a confident majority (fewer calls)
  temperature: 0.5
  max_tokens: 1200
  judge_every: 1           # judge every N rounds (>1 trades feedback granularity for fewer judge calls)
  anonymize: true          # hide model identities during peer review
  parallel: true           # fan proposer calls out concurrently
  # Pace HTTP calls to at most this many per minute, per provider (0 = off). Free
  # OpenRouter :free models cap at 20/min globally -- set ~18 to avoid 429 bursts.
  # A provider profile can override this with its own `rpm:` field.
  rate_limit_rpm: 0
  # Default alternates tried, in order, when a member/role call fails (e.g. free-tier 429).
  # Applies to any member/role without its own fallbacks, e.g. [openrouter:google/gemma-4-31b-it:free]
  fallbacks: []
  top_k: 0                 # if >0, rank candidates and fuse only the top-K (council/moa)
  devils_advocate: false   # debate: make one member argue the counter-case from round 2 on
  # strategy: cascade runs these stages cheapest-first, stopping at the first that
  # reaches target_score -- so easy tasks cost ~2-3 calls and only hard ones escalate.
  cascade: []              # e.g. [refine, debate, council]  (empty -> that default)

# Phase 1: design + refine the solve-prompt before the council answers.
promptsmith:
  enabled: true
  rounds: 2
  bootstrap: false         # seed the prompt engineer with instructions from past high-scoring sessions

judge:
  # Weighted 0-100 rubric; weights need not sum to 1 (they are normalised).
  rubric:
    correctness: 0.40
    completeness: 0.25
    clarity: 0.20
    grounding: 0.15
  cross_family_guard: true   # prefer a judge from a different vendor than the candidate
  json_mode: false           # request OpenAI JSON mode for judge/grader (only if your endpoint supports it)
  shuffle_candidates: true   # randomise candidate order to curb LLM-judge position bias (MT-Bench)

cost:
  budget_usd: 0.50           # abort a run if projected spend exceeds this (0 = no cap)
  # Per-model price overrides, USD per 1M tokens, e.g.:
  # pricing:
  #   openai/gpt-4o: { input: 2.5, output: 10 }
  pricing: {}

output:
  db_path: data/quorum.db
  dashboard_path: data/dashboard.html
