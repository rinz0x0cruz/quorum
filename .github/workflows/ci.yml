name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest'
        run: ruff check .
      - name: Offline selftest (mock provider, no key)
        run: python -m quorum selftest
      - name: Unit + HTTP tests
        run: pytest -q

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch the house-style checker
        uses: actions/checkout@v4
        with:
          repository: rinz0x0cruz/ai-agent-skills
          path: .agent-skills
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: House-style compliance (house_check.py)
        run: python .agent-skills/skills/ai-tool-builder/assets/house_check.py --strict .

  docker:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t quorum:ci .
      - name: Smoke-test the image (offline selftest inside the container)
        run: docker run --rm quorum:ci selftest
      - name: Export image as a downloadable artifact (no registry)
        run: docker save quorum:ci | gzip > quorum-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: quorum-docker-image
          path: quorum-image.tar.gz

  binary:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pyinstaller
      - name: Build single-file binary
        run: pyinstaller --onefile --name quorum quorum/__main__.py
      - name: Smoke-test the binary (offline)
        run: ./dist/quorum selftest
      - uses: actions/upload-artifact@v4
        with:
          name: quorum-linux-x86_64
          path: dist/quorum
