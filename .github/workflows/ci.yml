name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Offline selftest (mock provider, no key)
        run: python -m quorum selftest
      - name: Unit + HTTP tests
        run: pytest -q

  docker:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t quorum:${{ github.ref_name }} .
      - name: Smoke-test the image (mock config)
        run: |
          printf 'council:\n  members:\n    - { name: a, provider: mock, model: m/a }\n  judge: mock:openai/j\nproviders:\n  mock: { base_url: "", api_key_env: "" }\nrun: { strategy: refine, parallel: false }\n' > config.yaml
          docker run -d --name q -p 8802:8802 -v "$PWD/config.yaml:/app/config.yaml:ro" quorum:${{ github.ref_name }}
          sleep 3
          curl -fsS -X POST http://127.0.0.1:8802/v1/chat/completions -H 'Content-Type: application/json' -d '{"model":"refine","messages":[{"role":"user","content":"hi"}]}'
          docker rm -f q

  binary:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pyinstaller
      - name: Build single-file binary
        run: pyinstaller --onefile --name quorum quorum/__main__.py
      - name: Smoke-test the binary (offline)
        run: ./dist/quorum selftest
      - uses: actions/upload-artifact@v4
        with:
          name: quorum-linux-x86_64
          path: dist/quorum
